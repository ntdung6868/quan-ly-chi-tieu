name: Deploy to A2 Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Prepare deployment
        run: |
          mkdir -p deploy/.next/static
          cp -r .next/standalone/* deploy/
          cp -r .next/static/* deploy/.next/static/
          cp -r public deploy/public
          cp server.js deploy/server.js

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          password: ${{ secrets.A2_PASSWORD }}
          port: ${{ secrets.A2_PORT }}
          source: "deploy/*"
          target: "~/chitieu.ntdungdev.id.vn"
          strip_components: 1
          overwrite: true

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          password: ${{ secrets.A2_PASSWORD }}
          port: ${{ secrets.A2_PORT }}
          script: |
            cd ~/chitieu.ntdungdev.id.vn
            touch tmp/restart.txt
