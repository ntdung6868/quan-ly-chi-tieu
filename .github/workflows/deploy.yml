name: Deploy to A2 Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy source & build on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        with:
          host: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          password: ${{ secrets.A2_PASSWORD }}
          port: ${{ secrets.A2_PORT }}
          envs: NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY
          command_timeout: 15m
          script: |
            set -e
            APP_DIR=~/chitieu.ntdungdev.id.vn
            REPO_URL=https://github.com/ntdung6868/quan-ly-chi-tieu.git

            # Clone/pull source
            if [ -d "$APP_DIR/repo" ]; then
              cd $APP_DIR/repo && git pull origin main
            else
              git clone $REPO_URL $APP_DIR/repo
            fi

            cd $APP_DIR/repo

            # Use node from nodevenv
            source /home/${{ secrets.A2_USER }}/nodevenv/chitieu.ntdungdev.id.vn/22/bin/activate

            # Install & build
            npm ci --production=false
            NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY \
            npx next build

            # Deploy standalone to app root
            rm -rf $APP_DIR/.next $APP_DIR/node_modules $APP_DIR/public $APP_DIR/package.json $APP_DIR/server.next.js
            cp -r .next/standalone/* $APP_DIR/
            # Rename Next.js server.js so our server.js can wrap it
            mv $APP_DIR/server.js $APP_DIR/server.next.js
            mkdir -p $APP_DIR/.next/static
            cp -r .next/static/* $APP_DIR/.next/static/
            cp -r public $APP_DIR/public
            cp server.js $APP_DIR/server.js

            # Restart
            cd $APP_DIR
            touch tmp/restart.txt

            echo "Deploy complete!"
