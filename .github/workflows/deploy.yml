name: Deploy to A2 Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Prepare deployment
        run: |
          # Copy entire standalone output (includes .next/server, node_modules, server.js)
          cp -r .next/standalone deploy_tmp
          # Rename Next.js server.js
          mv deploy_tmp/server.js deploy_tmp/server.next.js
          # Add static files (not included in standalone)
          cp -r .next/static deploy_tmp/.next/static
          # Add public files
          cp -r public deploy_tmp/public
          # Add our custom server.js wrapper
          cp server.js deploy_tmp/server.js
          # Rename to deploy
          mv deploy_tmp deploy

      - name: Deploy via rsync
        env:
          A2_PASSWORD: ${{ secrets.A2_PASSWORD }}
          A2_USER: ${{ secrets.A2_USER }}
          A2_HOST: ${{ secrets.A2_HOST }}
          A2_PORT: ${{ secrets.A2_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          sshpass -p "$A2_PASSWORD" rsync -avz --delete \
            --exclude='.htaccess' --exclude='tmp' --exclude='stderr.log' --exclude='.well-known' --exclude='cgi-bin' \
            -e "ssh -p $A2_PORT -o StrictHostKeyChecking=no" \
            deploy/ "${A2_USER}@${A2_HOST}:~/chitieu.ntdungdev.id.vn/"

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          password: ${{ secrets.A2_PASSWORD }}
          port: ${{ secrets.A2_PORT }}
          script: |
            cd ~/chitieu.ntdungdev.id.vn
            mkdir -p tmp
            touch tmp/restart.txt
            echo "App restarted!"
